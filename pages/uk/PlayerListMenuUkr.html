<!DOCTYPE html>

            </div>
        </div>
    </div>

    <header>
        <div class="header">
            <a href="ukrindex.html" class="logo-link">

                    <img src="../../assets/images/iconrw.png" alt="RuneWorld Logo" class="logo-image">

            <nav class="desktop-menu">
                <a href="ukrindex.html">Головна</a>
            </nav>
        </div>

    <main class="players-page">
        <section class="players-hero">

        <section class="players-panel" aria-label="Список гравців RuneWorld">
            <div class="players-grid" id="playersGrid"></div>
        </section>
    </main>

    <div class="player-modal" id="playerModal" aria-hidden="true">
        <div class="player-modal-content" role="dialog" aria-modal="true" aria-labelledby="modalName">
            <div class="modal-header">
                <div class="modal-avatar" id="modalAvatar"></div>
                <div>
                    <div class="card-kicker modal-kicker">Профіль гравця</div>
                    <h2 class="modal-name" id="modalName"></h2>
                </div>
                <button class="close-modal" type="button" id="closeModal" aria-label="Закрити вікно">×</button>
            </div>
            <div class="modal-body">
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="stat-label">Час у грі</div>
                        <div class="stat-value" id="modalHours"></div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Статус</div>
                        <div class="stat-value" id="modalStatus"></div>
                    </div>
                </div>
                <div class="characteristic-box">
                    <h2>Характеристика</h2>
                    <p id="modalCharacteristic"></p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 RUNEWORLD</p>
    </footer>

    <script>
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            preloader.style.opacity = '1';
            setTimeout(() => {
                preloader.style.transition = 'opacity 0.5s ease';
                preloader.style.opacity = '0';
                setTimeout(() => preloader.style.display = 'none', 500);
            }, 300);
        });
    </script>

        const emojiMap = {
            "Runecraft2287": "👑",
            "💾kristoferUA💻": "⚡",
            "Freskacraft6746": "🌱",
            "NickMoytash": "🎯",
            "Denis12096": "🏗️",
            "MyxaaXD": "🎮",
            "Sasha123490": "🐻",
            "sokibtw": "⚡",
            "Vlad_merea": "⚔️",
            "Playcase1": "🏛️",
            "WrongAura742120": "🌟",
            "andrusha513": "🎲",
            "Radion6774": "📻",
            "DADAS": "✨"
};
        const labels = {
            time: "Час у грі",
            status: "Статус",
            noData: "Інформація про гравця поки недоступна"
        };

        const playersGrid = document.getElementById('playersGrid');
        const modal = document.getElementById('playerModal');
        const closeModalButton = document.getElementById('closeModal');

        function getPlayerEmoji(name) {
            return emojiMap[name] || '🎮';
        }

        function isNewbie(player) {
            return player.status === 'Новичок' || player.status === 'Новачок';
        }

        function createPlayerCard(player, index) {
            const card = document.createElement('button');
            card.className = 'player-card';
            card.type = 'button';
            card.dataset.index = index;

            const avatar = document.createElement('div');
            avatar.className = 'player-avatar';
            avatar.textContent = getPlayerEmoji(player.name);

            const name = document.createElement('div');
            name.className = 'player-name';
            name.textContent = player.name;

            const meta = document.createElement('div');
            meta.className = 'player-meta';

            const hours = document.createElement('span');
            hours.className = 'player-pill';
            hours.textContent = `${labels.time}: ${player.hours}`;

            const status = document.createElement('span');
            status.className = 'player-pill';
            status.textContent = `${labels.status}: ${player.status}`;

            meta.append(hours, status);
            card.append(avatar, name, meta);

            card.addEventListener('click', () => openModal(player));
            return card;
        }

        function openModal(player) {
            document.getElementById('modalAvatar').textContent = getPlayerEmoji(player.name);
            document.getElementById('modalName').textContent = player.name;
            document.getElementById('modalHours').textContent = player.hours;
            document.getElementById('modalStatus').textContent = player.status;

            const characteristicElement = document.getElementById('modalCharacteristic');
            const characteristic = player.characteristic.trim();
            const emptyValues = ['нет данных', 'немає даних'];

            if (emptyValues.includes(characteristic.toLowerCase())) {
                characteristicElement.textContent = labels.noData;
                characteristicElement.classList.add('no-data-text');
            } else {
                characteristicElement.textContent = characteristic;
                characteristicElement.classList.remove('no-data-text');
            }

            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('modal-open');
        }

        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closeModal();
            }
        });

        closeModalButton.addEventListener('click', closeModal);

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && modal.classList.contains('open')) {
                closeModal();
            }
        });

        players.forEach((player, index) => {
            playersGrid.appendChild(createPlayerCard(player, index));
        });
    </script>
</body>
</html>
