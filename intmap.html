<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта сервера - RuneWorld</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="seasons.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        /* 🔹 Стили для контейнера карты */
        .map-container {
            width: 100%;
            height: 75vh; /* Карта занимает 75% высоты экрана */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="preloader">
      <div class="spinner-box">
        <div class="configure-border-1">  
          <div class="configure-core"></div>
        </div>  
        <div class="configure-border-2">
          <div class="configure-core"></div>
        </div> 
      </div>
    </div>

    <header>
        <div class="header">
            <a href="index.html" class="logo-link">
                <div class="logo">
                    RuneWorld
                    <img src="iconrw.png" alt="RuneWorld Logo" class="logo-image">
                </div>
            </a>
            <nav>
                <a href="index.html">Главная</a>
            </nav>
        </div>
    </header>

    <div class="main">
        <h1 class="main-title">Интерактивная карта в реальном времени</h1>
        
        <div class="map-container">
            <iframe src="https://runeworld.dynmap.xyz" title="RuneWorld Map"></iframe>
        </div>
    </div>

    <footer>
        <div class="footer">
            <p>&copy; 2026 RUNEWORLD</p>
        </div>
    </footer>

    <script>
      window.addEventListener("load", () => {
        const preloader = document.getElementById("preloader");
        preloader.style.opacity = "1";
        setTimeout(() => {
          preloader.style.transition = "opacity 0.5s ease";
          preloader.style.opacity = "0";
          setTimeout(() => preloader.style.display = "none", 500);
        }, 300); // маленькая задержка перед исчезновением
      });
    </script>
</body>
</html>
